# Weapon Detection Classes
# Used for YOLOv8 training

classes:
  0: gun
  1: pistol
  2: rifle
  3: knife
  4: machete
  5: bat
  6: alcohol_bottle
  7: broken_bottle
  8: sword

# Class grouping for simplified output
class_groups:
  firearms:
    - gun
    - pistol
    - rifle
  bladed_weapons:
    - knife
    - machete
    - sword
  blunt_weapons:
    - bat
  dangerous_objects:
    - alcohol_bottle
    - broken_bottle

# Detection thresholds
thresholds:
  confidence_min: 0.5
  nms_iou: 0.45
